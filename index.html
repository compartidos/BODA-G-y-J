<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Boda</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cream: #faf6f0; --gold: #c9a96e; --dark: #2c2420; --muted: #8a7968; }
  body { background: var(--cream); color: var(--dark); font-family: 'Jost', sans-serif; font-weight: 300; }

  .hero { position: relative; width: 100%; height: 100vh; overflow: hidden; }
  .hero img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.75); }
  .hero-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 24px;
    background: linear-gradient(to bottom, rgba(44,36,32,0.15) 0%, rgba(44,36,32,0.5) 100%);
  }
  .hero-overlay .names {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.6rem, 10vw, 5rem);
    font-weight: 300; color: white;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    letter-spacing: 0.05em; line-height: 1.2;
  }
  .hero-overlay .ampersand { font-style: italic; color: var(--gold); }
  .hero-overlay .date {
    display: block; font-family: 'Jost', sans-serif;
    font-size: clamp(0.7rem, 3vw, 0.85rem);
    letter-spacing: 0.28em; color: rgba(255,255,255,0.9);
    margin-top: 16px; text-transform: uppercase;
  }
  .hero-overlay .caption {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; color: rgba(255,255,255,0.8);
    font-size: clamp(0.95rem, 3.5vw, 1.15rem);
    margin-top: 10px; letter-spacing: 0.02em;
  }

  /* PÁGINA DE CIERRE */
  .cierre-page {
    min-height: 60vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 60px 24px;
  }
  .cierre-page .section-label {
    font-size: 0.68rem; letter-spacing: 0.35em;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 20px; display: block;
  }
  .cierre-page .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 300; line-height: 1.3; margin-bottom: 20px;
  }
  .cierre-page .section-text {
    color: var(--muted); font-size: 0.92rem;
    line-height: 1.9; max-width: 340px;
  }
  .cierre-icon { font-size: 3rem; margin-bottom: 20px; }

  /* UPLOAD */
  .upload-section { max-width: 600px; margin: 56px auto 48px; padding: 0 20px; text-align: center; }
  .section-label { font-size: 0.68rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; display: block; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.7rem, 7vw, 2.4rem); font-weight: 300; line-height: 1.3; margin-bottom: 14px; }
  .section-text { color: var(--muted); font-size: 0.88rem; line-height: 1.9; margin-bottom: 28px; }

  .upload-btn-area { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .upload-label {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%; max-width: 340px; padding: 18px 30px;
    background: var(--dark); color: var(--cream);
    font-family: 'Jost', sans-serif; font-size: 0.82rem;
    letter-spacing: 0.22em; text-transform: uppercase;
    border-radius: 3px; cursor: pointer;
    transition: background 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .upload-label:active { background: var(--gold); }
  .upload-label .cam-icon { font-size: 1.3rem; }
  #fileInput { display: none; }

  .preview-strip { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .preview-strip img { width: 72px; height: 72px; object-fit: cover; border-radius: 4px; }

  .progress-wrap { width: 100%; max-width: 340px; margin: 0 auto; }
  .progress-bar-bg { background: #e8e0d5; border-radius: 2px; height: 3px; overflow: hidden; display: none; margin-bottom: 8px; }
  .progress-bar-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.4s ease; }
  .progress-msg { font-size: 0.82rem; color: var(--muted); min-height: 20px; text-align: center; }

  .btn-subir {
    width: 100%; max-width: 340px; padding: 16px;
    background: var(--gold); color: white;
    font-family: 'Jost', sans-serif; font-size: 0.82rem;
    letter-spacing: 0.22em; text-transform: uppercase;
    border: none; border-radius: 3px; cursor: pointer;
    transition: opacity 0.3s; display: none;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-subir:active { opacity: 0.8; }
  .btn-subir:disabled { background: #bbb; cursor: not-allowed; }

  .divider { display: flex; align-items: center; gap: 16px; max-width: 340px; margin: 0 auto 44px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--gold); opacity: 0.35; }
  .divider span { color: var(--gold); font-size: 1rem; }

  .gallery-section { max-width: 1000px; margin: 0 auto 80px; padding: 0 12px; }
  .gallery-section .section-label, .gallery-section .section-title { text-align: center; }
  .gallery-section .section-title { font-size: clamp(1.3rem, 5vw, 1.9rem); margin-bottom: 24px; }

  .collage { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
  .collage-item { aspect-ratio: 1; overflow: hidden; cursor: pointer; }
  .collage-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; display: block; }
  .collage-item:active img { transform: scale(1.05); }
  .empty-gallery { text-align: center; color: var(--muted); font-style: italic; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; padding: 50px 0; grid-column: 1/-1; }

  .lightbox { display: none; position: fixed; inset: 0; background: rgba(44,36,32,0.97); z-index: 1000; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 95vw; max-height: 88vh; object-fit: contain; border-radius: 2px; }
  .lightbox-close { position: absolute; top: 16px; right: 20px; color: white; font-size: 2rem; cursor: pointer; padding: 8px; }
</style>
</head>
<body>

<section class="hero">
  <!-- ✏️ REEMPLAZÁ esta URL con tu foto cuando la tengas -->
  <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=1200&q=85" alt="Nuestra boda">
  <div class="hero-overlay">
    <div class="names">
      María <span class="ampersand">&</span> Santiago
      <span class="date">11 · Septiembre · 2026 — Asunción, Paraguay</span>
    </div>
    <p class="caption">Un día para recordar siempre</p>
  </div>
</section>

<!-- Contenido dinámico según horario -->
<div id="contenido"></div>

<div class="lightbox" id="lightbox">
  <span class="lightbox-close" onclick="closeLightbox()">✕</span>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
  const IMGBB_KEY   = '15413fd5f5c0ccb2156539dc47df6d81';
  const JSONBIN_KEY = '$2a$10$LnaTutRD2/VQCqAl8cDqvu9JWx5dc1T8QufsoAp9WcVFdKBguok6.';
  const BIN_ID      = '6a1f27a0da38895dfe7d44df';
  const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

  const CIERRE = new Date('2026-09-12T03:00:00');
  const abierto = new Date() <= CIERRE;

  // ── Renderizar página según horario ──
  if (!abierto) {
    // CERRADO — solo mensaje, sin fotos
    document.getElementById('contenido').innerHTML = `
      <div class="cierre-page">
        <span class="cierre-icon">🌙</span>
        <span class="section-label">Galería cerrada</span>
        <h2 class="section-title">¡Gracias por<br><em>acompañarnos!</em></h2>
        <p class="section-text">
          La galería ya no está disponible.<br>
          Fue un honor compartir este día con vos.
        </p>
      </div>
    `;
  } else {
    // ABIERTO — mostrar upload + galería
    document.getElementById('contenido').innerHTML = `
      <section class="upload-section" id="uploadSection">
        <span class="section-label">Galería compartida</span>
        <h2 class="section-title">Compartí tus<br><em>momentos</em></h2>
        <p class="section-text">Subí tus fotos favoritas y formá parte de este álbum que guardaremos para siempre.</p>
        <div class="upload-btn-area">
          <input type="file" id="fileInput" accept="image/*" multiple>
          <label class="upload-label" for="fileInput">
            <span class="cam-icon">📷</span>
            Seleccionar fotos
          </label>
          <div class="preview-strip" id="previewStrip"></div>
          <div class="progress-wrap">
            <div class="progress-bar-bg" id="progressBg">
              <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-msg" id="progressMsg"></div>
          </div>
          <button class="btn-subir" id="uploadBtn" onclick="uploadAll()">Subir fotos ✦</button>
        </div>
      </section>
      <div class="divider"><span>✦</span></div>
      <section class="gallery-section">
        <span class="section-label">Momentos capturados</span>
        <h2 class="section-title">El álbum de todos</h2>
        <div class="collage" id="gallery">
          <div class="empty-gallery">Cargando fotos...</div>
        </div>
      </section>
    `;

    document.getElementById('fileInput').addEventListener('change', e => handleFiles(e.target.files));
    cargarGaleria();
  }

  let selectedFiles = [];

  function handleFiles(files) {
    selectedFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
    const strip = document.getElementById('previewStrip');
    strip.innerHTML = '';
    selectedFiles.forEach(f => {
      const img = document.createElement('img');
      img.src = URL.createObjectURL(f);
      strip.appendChild(img);
    });
    const btn = document.getElementById('uploadBtn');
    btn.style.display = selectedFiles.length ? 'block' : 'none';
    btn.disabled = selectedFiles.length === 0;
    document.getElementById('progressMsg').textContent =
      selectedFiles.length ? `${selectedFiles.length} foto(s) seleccionada(s)` : '';
  }

  function comprimirImagen(file) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        const MAX = 1200;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.78);
      };
      img.src = URL.createObjectURL(file);
    });
  }

  async function uploadAll() {
    if (!selectedFiles.length) return;
    const btn = document.getElementById('uploadBtn');
    const msg = document.getElementById('progressMsg');
    const fill = document.getElementById('progressFill');
    const bg = document.getElementById('progressBg');

    btn.disabled = true;
    bg.style.display = 'block';
    const total = selectedFiles.length;
    const nuevas = [];

    for (let i = 0; i < total; i++) {
      msg.textContent = `Subiendo foto ${i + 1} de ${total}...`;
      fill.style.width = ((i / total) * 100) + '%';
      try {
        const url = await subirAImgBB(selectedFiles[i]);
        if (url) nuevas.push({ url, fecha: new Date().toISOString() });
      } catch(e) { console.error(e); }
    }

    fill.style.width = '100%';
    if (nuevas.length) {
      msg.textContent = 'Guardando en la galería...';
      await agregarFotosAlBin(nuevas);
    }

    msg.textContent = `✓ ${nuevas.length} foto(s) subida(s)!`;
    document.getElementById('previewStrip').innerHTML = '';
    selectedFiles = [];
    btn.style.display = 'none';

    setTimeout(async () => {
      bg.style.display = 'none';
      fill.style.width = '0%';
      msg.textContent = '';
      await cargarGaleria();
    }, 2000);
  }

  async function subirAImgBB(file) {
    const blob = await comprimirImagen(file);
    const formData = new FormData();
    formData.append('image', blob, file.name);
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
      method: 'POST', body: formData
    });
    const json = await res.json();
    if (json.success) return json.data.url;
    throw new Error(json.error?.message || 'Error ImgBB');
  }

  async function agregarFotosAlBin(nuevas) {
    try {
      const res = await fetch(JSONBIN_URL, { headers: { 'X-Master-Key': JSONBIN_KEY } });
      const data = await res.json();
      const actuales = data.record?.fotos || [];
      await fetch(JSONBIN_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
        body: JSON.stringify({ fotos: [...nuevas, ...actuales] })
      });
    } catch(e) { console.error('Error JSONBin:', e); }
  }

  async function cargarGaleria() {
    const gallery = document.getElementById('gallery');
    if (!gallery) return;
    try {
      const res = await fetch(JSONBIN_URL, { headers: { 'X-Master-Key': JSONBIN_KEY } });
      const data = await res.json();
      const fotos = data.record?.fotos || [];
      if (!fotos.length) {
        gallery.innerHTML = '<div class="empty-gallery">Aún no hay fotos.<br>¡Sé el primero en subir la tuya!</div>';
        return;
      }
      gallery.innerHTML = fotos.map(f => `
        <div class="collage-item" onclick="openLightbox('${f.url}')">
          <img src="${f.url}" alt="Foto boda" loading="lazy">
        </div>
      `).join('');
    } catch(e) {
      gallery.innerHTML = '<div class="empty-gallery">Error al cargar. Recargá la página.</div>';
    }
  }

  function openLightbox(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightboxImg').src = '';
  }
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });
</script>
</body>
</html>
