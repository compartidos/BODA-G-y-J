<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Boda</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #faf7f2;
    --gold: #b8965a;
    --gold2: #d4af72;
    --dark: #1e1a16;
    --muted: #7a6e62;
    --border: #e0d5c5;
  }
  body { background: var(--cream); color: var(--dark); font-family: 'Jost', sans-serif; font-weight: 300; overflow-x: hidden; }

  /* ══ ANIMACIONES ══ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(1.04); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes lineGrow {
    from { width: 0; opacity: 0; }
    to { width: 60px; opacity: 0.7; }
  }

  .hero img { animation: scaleIn 1.8s ease forwards; }
  .hero-deco { animation: fadeIn 1.2s ease 0.3s both; }
  .names { animation: fadeUp 1.1s ease 0.6s both; }
  .date-wrap { animation: fadeUp 1.1s ease 0.9s both; }
  .caption { animation: fadeUp 1.1s ease 1.1s both; }

  /* Fade al hacer scroll */
  .fade-section {
    opacity: 0; transform: translateY(30px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .fade-section.visible {
    opacity: 1; transform: translateY(0);
  }

  /* ══ HERO ══ */
  .hero { position: relative; width: 100%; height: 100vh; overflow: hidden; }
  .hero img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.65); }
  .hero-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 32px;
    background: linear-gradient(to bottom, rgba(20,16,12,0.1) 0%, rgba(20,16,12,0.55) 100%);
  }
  .hero-deco { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .hero-deco-line { width: 60px; height: 1px; background: var(--gold2); opacity: 0.7; }
  .hero-deco-diamond { width: 8px; height: 8px; border: 1px solid var(--gold2); transform: rotate(45deg); opacity: 0.9; }
  .names {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 11vw, 6rem);
    font-weight: 300; color: white;
    text-shadow: 0 2px 30px rgba(0,0,0,0.4);
    letter-spacing: 0.08em; line-height: 1.1; margin-bottom: 20px;
  }
  .ampersand { font-style: italic; color: var(--gold2); font-size: 0.9em; margin: 0 8px; }
  .date-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .date-line { width: 40px; height: 1px; background: var(--gold2); opacity: 0.6; }
  .date {
    font-family: 'Jost', sans-serif; font-weight: 200;
    font-size: clamp(0.65rem, 2.5vw, 0.78rem);
    letter-spacing: 0.35em; color: rgba(255,255,255,0.88); text-transform: uppercase;
  }
  .caption {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; color: rgba(255,255,255,0.75);
    font-size: clamp(1rem, 3.5vw, 1.2rem); letter-spacing: 0.04em;
  }

  /* ══ ORNAMENTO ══ */
  .ornament { display: flex; align-items: center; gap: 16px; max-width: 320px; margin: 0 auto; padding: 48px 0 40px; }
  .ornament-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); }
  .ornament-symbol { color: var(--gold); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; opacity: 0.8; }

  /* ══ BIENVENIDA ══ */
  .welcome-section {
    max-width: 580px; margin: 0 auto 0; padding: 0 28px 52px;
    text-align: center;
  }
  .welcome-icon { font-size: 2rem; margin-bottom: 18px; display: block; }
  .welcome-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    font-weight: 300; line-height: 1.3;
    margin-bottom: 20px; color: var(--dark);
  }
  .welcome-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1rem, 3vw, 1.15rem);
    color: var(--muted); line-height: 2;
    text-align: center;
    margin: 0 auto; max-width: 460px;
  }

  /* ══ UPLOAD ══ */
  .upload-section { max-width: 560px; margin: 0 auto 56px; padding: 0 24px; text-align: center; }
  .section-eyebrow { font-size: 0.62rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; display: block; font-weight: 400; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 7vw, 2.8rem); font-weight: 300; line-height: 1.25; margin-bottom: 32px; color: var(--dark); }
  .upload-btn-area { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .upload-label {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%; max-width: 300px; padding: 16px 28px;
    background: var(--gold); color: white;
    font-family: 'Jost', sans-serif; font-size: 0.72rem;
    letter-spacing: 0.3em; text-transform: uppercase;
    border-radius: 1px; cursor: pointer;
    transition: background 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .upload-label:active { background: var(--gold2); }
  #fileInput { display: none; }
  .preview-strip { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .preview-strip img { width: 68px; height: 68px; object-fit: cover; border-radius: 2px; border: 1px solid var(--border); }
  .progress-wrap { width: 100%; max-width: 300px; }
  .progress-bar-bg { background: #e8e0d5; border-radius: 1px; height: 2px; overflow: hidden; display: none; margin-bottom: 10px; }
  .progress-bar-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.4s ease; }
  .progress-msg { font-size: 0.78rem; color: var(--muted); min-height: 20px; text-align: center; letter-spacing: 0.05em; }
  .btn-subir {
    width: 100%; max-width: 300px; padding: 15px;
    background: var(--dark); color: white;
    font-family: 'Jost', sans-serif; font-size: 0.72rem;
    letter-spacing: 0.3em; text-transform: uppercase;
    border: none; border-radius: 1px; cursor: pointer;
    transition: background 0.3s; display: none;
    -webkit-tap-highlight-color: transparent; font-weight: 400;
  }
  .btn-subir:active { background: var(--gold); }
  .btn-subir:disabled { background: #ccc; cursor: not-allowed; }

  /* ══ GALERÍA ══ */
  .gallery-section { max-width: 1000px; margin: 0 auto 100px; padding: 0 12px; }
  .gallery-section .section-eyebrow, .gallery-section .section-title { text-align: center; }
  .gallery-section .section-title { font-size: clamp(1.6rem, 5vw, 2.2rem); margin-bottom: 32px; }
  .collage { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .collage-item { aspect-ratio: 1; overflow: hidden; cursor: pointer; position: relative; }
  .collage-item::after { content: ''; position: absolute; inset: 0; background: rgba(20,16,12,0); transition: background 0.3s; }
  .collage-item:hover::after { background: rgba(20,16,12,0.15); }
  .collage-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; display: block; }
  .collage-item:hover img { transform: scale(1.06); }
  .empty-gallery { text-align: center; color: var(--muted); font-style: italic; font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; padding: 60px 0; grid-column: 1/-1; line-height: 1.8; }

  /* ══ CIERRE ══ */
  .cierre-page { min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 24px; }
  .cierre-icon { font-size: 2.5rem; margin-bottom: 24px; }

  /* ══ LIGHTBOX ══ */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(20,16,12,0.97); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 95vw; max-height: 80vh; object-fit: contain; border-radius: 1px; }
  .lightbox-close { position: absolute; top: 18px; right: 22px; color: rgba(255,255,255,0.6); font-size: 1.8rem; cursor: pointer; font-family: 'Cormorant Garamond', serif; transition: color 0.2s; padding: 8px; }
  .lightbox-close:hover { color: white; }

  @media (max-width: 600px) { .collage { gap: 3px; } }
</style>
</head>
<body>

<!-- ══ HERO ══ -->
<section class="hero">
  <!-- ✏️ REEMPLAZÁ esta URL con tu foto -->
  <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=1200&q=85" alt="Nuestra boda">
  <div class="hero-overlay">
    <div class="hero-deco">
      <div class="hero-deco-line"></div>
      <div class="hero-deco-diamond"></div>
      <div class="hero-deco-line"></div>
    </div>
    <div class="names">Gilda <span class="ampersand">&</span> Julio</div>
    <div class="date-wrap">
      <div class="date-line"></div>
      <span class="date">11 · Septiembre · 2026 </span>
      <div class="date-line"></div>
    </div>
    <p class="caption">Un día para recordar siempre</p>
  </div>
</section>

<!-- ══ ORNAMENTO ══ -->
<div class="ornament fade-section">
  <div class="ornament-line"></div>
  <span class="ornament-symbol">✦</span>
  <div class="ornament-line"></div>
</div>

<!-- ══ MENSAJE DE BIENVENIDA ══ -->
<section class="welcome-section fade-section">
  <p class="welcome-text">
    Queridos amigos y familia, cada foto que compartan será un tesoro que guardaremos para siempre. Gracias por ser parte de este día tan especial.
  </p>
  <div style="margin-top:32px;">
    <input type="file" id="fileInputTop" accept="image/*" multiple style="display:none;">
    <label for="fileInputTop" style="display:inline-flex; align-items:center; justify-content:center; padding:16px 40px; background:var(--gold); color:white; font-family:'Jost',sans-serif; font-size:0.72rem; letter-spacing:0.3em; text-transform:uppercase; border-radius:1px; cursor:pointer; transition:background 0.3s; -webkit-tap-highlight-color:transparent;">
      Seleccionar fotos
    </label>
  </div>
  <div class="preview-strip" id="previewStripTop" style="margin-top:16px; display:flex; gap:8px; flex-wrap:wrap; justify-content:center;"></div>
  <div style="width:100%; max-width:300px; margin:16px auto 0;">
    <div class="progress-bar-bg" id="progressBgTop" style="background:#e8e0d5; border-radius:1px; height:2px; overflow:hidden; display:none; margin-bottom:10px;">
      <div class="progress-bar-fill" id="progressFillTop" style="height:100%; background:var(--gold); width:0%; transition:width 0.4s ease;"></div>
    </div>
    <div class="progress-msg" id="progressMsgTop" style="font-size:0.78rem; color:var(--muted); min-height:20px; text-align:center;"></div>
  </div>
  <button id="uploadBtnTop" onclick="uploadAllTop()" style="display:none; margin-top:12px; padding:15px 40px; background:var(--dark); color:white; font-family:'Jost',sans-serif; font-size:0.72rem; letter-spacing:0.3em; text-transform:uppercase; border:none; border-radius:1px; cursor:pointer;">Subir fotos ✦</button>
</section>

<div class="ornament fade-section">
  <div class="ornament-line"></div>
  <span class="ornament-symbol">✦</span>
  <div class="ornament-line"></div>
</div>

<!-- ══ CONTENIDO DINÁMICO ══ -->
<div id="contenido"></div>

<!-- ══ LIGHTBOX ══ -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" onclick="closeLightbox()">✕</span>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
  const IMGBB_KEY   = '9a76a37e8764fdd57b8413d248441fdb';
  const JSONBIN_KEY = '$2a$10$LnaTutRD2/VQCqAl8cDqvu9JWx5dc1T8QufsoAp9WcVFdKBguok6.';
  const BIN_ID      = '6a1f27a0da38895dfe7d44df';
  const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
  const CIERRE      = new Date('2026-09-12T03:00:00');
  const abierto     = new Date() <= CIERRE;

  // ── Animaciones al hacer scroll ──
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
  }, { threshold: 0.15 });
  document.querySelectorAll('.fade-section').forEach(el => observer.observe(el));

  if (!abierto) {
    document.getElementById('contenido').innerHTML = `
      <div class="cierre-page fade-section">
        <span class="cierre-icon">🌙</span>
        <span class="section-eyebrow">Galería cerrada</span>
        <h2 style="font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(2rem,7vw,2.8rem); margin-bottom:16px;">¡Gracias por<br><em>acompañarnos!</em></h2>
        <p style="color:var(--muted); font-size:0.9rem; line-height:1.9; max-width:320px;">La galería ya no está disponible.<br>Fue un honor compartir este día con vos.</p>
      </div>
    `;
  } else {
    document.getElementById('contenido').innerHTML = `
      <section class="gallery-section fade-section">
        <span class="section-eyebrow">Momentos capturados</span>
        <h2 class="section-title" style="font-family:'Cormorant Garamond',serif; font-weight:300;">El álbum de todos</h2>
        <div class="collage" id="gallery">
          <div class="empty-gallery">Cargando fotos...</div>
        </div>
      </section>
    `;
    // Observar nuevos elementos dinámicos
    document.querySelectorAll('.fade-section').forEach(el => observer.observe(el));
    cargarGaleria();
  }

  let selectedFiles = [];

  function handleFiles(files) {
    selectedFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
    const strip = document.getElementById('previewStrip');
    strip.innerHTML = '';
    selectedFiles.forEach(f => {
      const img = document.createElement('img');
      img.src = URL.createObjectURL(f);
      strip.appendChild(img);
    });
    const btn = document.getElementById('uploadBtn');
    btn.style.display = selectedFiles.length ? 'block' : 'none';
    btn.disabled = selectedFiles.length === 0;
    document.getElementById('progressMsg').textContent =
      selectedFiles.length ? `${selectedFiles.length} foto(s) seleccionada(s)` : '';
  }

  function comprimirImagen(file) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        const MAX = 1200;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.78);
      };
      img.src = URL.createObjectURL(file);
    });
  }

  async function uploadAll() {
    if (!selectedFiles.length) return;
    const btn = document.getElementById('uploadBtn');
    const msg = document.getElementById('progressMsg');
    const fill = document.getElementById('progressFill');
    const bg = document.getElementById('progressBg');

    btn.disabled = true;
    bg.style.display = 'block';
    const total = selectedFiles.length;
    const nuevas = [];

    for (let i = 0; i < total; i++) {
      msg.textContent = `Subiendo foto ${i + 1} de ${total}...`;
      fill.style.width = ((i / total) * 100) + '%';
      try {
        const url = await subirAImgBB(selectedFiles[i]);
        if (url) nuevas.push({ url, fecha: new Date().toISOString() });
      } catch(e) { console.error(e); }
    }

    fill.style.width = '100%';
    if (nuevas.length) {
      msg.textContent = 'Guardando en la galería...';
      await agregarFotosAlBin(nuevas);
    }

    msg.textContent = `✓ ${nuevas.length} foto(s) subida(s) con éxito`;
    document.getElementById('previewStrip').innerHTML = '';
    selectedFiles = [];
    btn.style.display = 'none';

    setTimeout(async () => {
      bg.style.display = 'none';
      fill.style.width = '0%';
      msg.textContent = '';
      await cargarGaleria();
    }, 2000);
  }

  async function subirAImgBB(file) {
    const blob = await comprimirImagen(file);
    const formData = new FormData();
    formData.append('image', blob, file.name);
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
      method: 'POST', body: formData
    });
    const json = await res.json();
    if (json.success) return json.data.url;
    throw new Error(json.error?.message || 'Error ImgBB');
  }

  async function agregarFotosAlBin(nuevas) {
    try {
      const res = await fetch(JSONBIN_URL, { headers: { 'X-Master-Key': JSONBIN_KEY } });
      const data = await res.json();
      const actuales = data.record?.fotos || [];
      await fetch(JSONBIN_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
        body: JSON.stringify({ fotos: [...nuevas, ...actuales] })
      });
    } catch(e) { console.error('Error JSONBin:', e); }
  }

  async function cargarGaleria() {
    const gallery = document.getElementById('gallery');
    if (!gallery) return;
    try {
      const res = await fetch(JSONBIN_URL, { headers: { 'X-Master-Key': JSONBIN_KEY } });
      const data = await res.json();
      const fotos = data.record?.fotos || [];
      if (!fotos.length) {
        gallery.innerHTML = '<div class="empty-gallery">Aún no hay fotos.<br><em>¡Sé el primero en compartir un recuerdo!</em></div>';
        return;
      }
      gallery.innerHTML = fotos.map(f => `
        <div class="collage-item" onclick="openLightbox('${f.url}')">
          <img src="${f.url}" alt="Foto boda" loading="lazy" onerror="this.parentElement.style.display='none'">
        </div>
      `).join('');
    } catch(e) {
      gallery.innerHTML = '<div class="empty-gallery"><em>Aún no hay fotos.<br>¡Sé el primero en compartir un recuerdo!</em></div>';
    }
  }

  // ── Upload desde sección bienvenida ──
  let selectedFilesTop = [];

  const fileInputTop = document.getElementById('fileInputTop');
  if (fileInputTop) {
    fileInputTop.addEventListener('change', e => {
      selectedFilesTop = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
      const strip = document.getElementById('previewStripTop');
      strip.innerHTML = '';
      selectedFilesTop.forEach(f => {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(f);
        img.style.cssText = 'width:68px;height:68px;object-fit:cover;border-radius:2px;border:1px solid var(--border);';
        strip.appendChild(img);
      });
      const btn = document.getElementById('uploadBtnTop');
      btn.style.display = selectedFilesTop.length ? 'block' : 'none';
      document.getElementById('progressMsgTop').textContent =
        selectedFilesTop.length ? `${selectedFilesTop.length} foto(s) seleccionada(s)` : '';
    });
  }

  async function uploadAllTop() {
    if (!selectedFilesTop.length) return;
    const btn = document.getElementById('uploadBtnTop');
    const msg = document.getElementById('progressMsgTop');
    const fill = document.getElementById('progressFillTop');
    const bg = document.getElementById('progressBgTop');

    btn.disabled = true;
    bg.style.display = 'block';
    const total = selectedFilesTop.length;
    const nuevas = [];

    for (let i = 0; i < total; i++) {
      msg.textContent = `Subiendo foto ${i + 1} de ${total}...`;
      fill.style.width = ((i / total) * 100) + '%';
      try {
        const url = await subirAImgBB(selectedFilesTop[i]);
        if (url) nuevas.push({ url, fecha: new Date().toISOString() });
      } catch(e) { console.error(e); }
    }

    fill.style.width = '100%';
    if (nuevas.length) {
      msg.textContent = 'Guardando en la galería...';
      await agregarFotosAlBin(nuevas);
    }

    msg.textContent = `✓ ${nuevas.length} foto(s) subida(s) con éxito`;
    document.getElementById('previewStripTop').innerHTML = '';
    selectedFilesTop = [];
    btn.style.display = 'none';

    setTimeout(async () => {
      bg.style.display = 'none';
      fill.style.width = '0%';
      msg.textContent = '';
      await cargarGaleria();
    }, 2000);
  }

  function openLightbox(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightboxImg').src = '';
  }
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });
</script>
</body>
</html>
